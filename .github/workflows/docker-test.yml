name: Docker Test

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-18.04, ubuntu-20.04]
    steps:
    - uses: actions/checkout@v2
    - name: Run Docker Test (${{ matrix.os }})
      run: sudo make -C scripts/ci docker-test

  docker-build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2
      - name: Set storage driver
        run: |
          echo $'{\n    "storage-driver": \"devicemapper\"\n}' | sudo tee /etc/docker/daemon.json
          sudo service docker restart
      - name: Run biuld inside docker container
        run: sudo make docker-build
      - name: Run tests inside docker container
        run: sudo make docker-test
